version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: kwol_db
    restart: always
    environment:
      POSTGRES_USER: kwol_user
      POSTGRES_PASSWORD: kwol_password
      POSTGRES_DB: kwol_registration
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kwol_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kwol_user -d kwol_registration"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kwol_backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: "postgresql://kwol_user:kwol_password@postgres:5432/kwol_registration?schema=public"
      PORT: 5001
      FRONTEND_URL: "http://localhost:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - kwol_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kwol_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5001/api"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    networks:
      - kwol_network

networks:
  kwol_network:
    driver: bridge

volumes:
  postgres_data:
